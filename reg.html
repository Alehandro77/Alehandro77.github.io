<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Регистрация</title>
</head>
<body>
    <div class="reg">
        <h1>Регистрация</h1>
        <form>
            <input type="text" name="name" placeholder="Иван">
            <input type="email" name="email" placeholder="ivan@gmail.com"> 
            <input type="password" name="password" placeholder="1234"> 
            <input type="tel" name="tel" placeholder="8 800 555 35 35"> 
            <button type="button" class="btn">Зарегистрировать</button>
        </form>
    </div>
<script src="registration.js"></script>
</body>
</html>
